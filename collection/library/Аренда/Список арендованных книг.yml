info:
  name: Список арендованных книг
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}rented-books"
  headers:
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
