info:
  name: Изменить книгу
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{host}}books/2"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "titleeeeeee"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
