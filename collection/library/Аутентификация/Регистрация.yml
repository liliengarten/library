info:
  name: Регистрация
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}register"
  headers:
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "asdfg",
        "surname": "dfghj",
        "email": "qwerty@email.com",
        "password": "Qwerty12345"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
